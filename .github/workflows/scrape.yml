name: Scrape Valencia Events

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 6am UTC (8am Valencia time)
  workflow_dispatch:        # also lets you trigger it manually from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit events.db back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd scraper
          python3 main.py

      - name: Commit updated DB and events.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.db frontend/src/events.json
          git diff --staged --quiet || git commit -m "chore: daily scrape $(date -u +%Y-%m-%d)"
          git push
name: Valencia Events

on:
  push:
    branches: [main]        # deploy on every push
  workflow_dispatch:        # keep manual trigger for when you want to scrape

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      # -------------------------------------------------------
